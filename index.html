<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wenni私厨</title>
  <style>
    :root {
      --bg: #fff8f0;
      --paper: #fffdf9;
      --ink: #2e241b;
      --muted: #7a6758;
      --line: #f0ddce;
      --brand: #ff7a45;
      --brand-dark: #c9572d;
      --soft: #ffe7d1;
      --green: #2f8f6b;
      --gold: #d97706;
      --shadow: 0 18px 50px rgba(119, 76, 42, .14);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, Segoe UI, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 122, 69, .16), transparent 28%),
        linear-gradient(180deg, #fff8f0 0%, #fff3e8 48%, #fffaf5 100%);
      min-height: 100vh;
    }

    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 14px 0 38px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      backdrop-filter: blur(16px);
      background: rgba(255, 248, 240, .82);
    }

    .mini-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 18px;
      white-space: nowrap;
    }

    .mini-logo {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--brand);
      color: white;
      box-shadow: 0 8px 18px rgba(255, 122, 69, .25);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 38px;
      padding: 9px 13px;
      border-radius: 999px;
      background: var(--brand);
      color: #fff;
      box-shadow: 0 10px 22px rgba(255, 122, 69, .22);
      white-space: nowrap;
    }

    .btn.secondary {
      background: rgba(255, 253, 249, .9);
      color: var(--ink);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .btn.green { background: var(--green); }
    .btn.dark { background: var(--ink); }
    .btn.icon { width: 38px; padding: 0; border-radius: 50%; }

    .hero {
      min-height: min(620px, calc(100vh - 78px));
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(320px, 480px);
      gap: 28px;
      align-items: center;
      padding: 28px 0 34px;
    }

    .hero-copy {
      position: relative;
      z-index: 1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--brand-dark);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      box-shadow: 0 8px 20px rgba(119, 76, 42, .08);
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(42px, 7vw, 76px);
      line-height: .98;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .hero-photo {
      position: relative;
      min-height: 420px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      background:
        linear-gradient(145deg, rgba(46, 36, 27, .08), rgba(255, 122, 69, .12)),
        url("https://images.unsplash.com/photo-1543353071-10c8ba85a904?auto=format&fit=crop&w=1200&q=80") center/cover;
    }

    .hero-photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 46%, rgba(46, 36, 27, .56));
    }

    .hero-note {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      z-index: 1;
      color: #fff;
    }

    .hero-note strong {
      display: block;
      font-size: 24px;
      margin-bottom: 6px;
    }

    .hero-note span { color: rgba(255,255,255,.86); }

    .section {
      margin-top: 22px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-bottom: 12px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 26px;
    }

    .section-head p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .category-strip {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      padding: 4px 2px 12px;
      scrollbar-width: thin;
    }

    .tab {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 999px;
      padding: 9px 14px;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(119, 76, 42, .07);
    }

    .tab.active {
      background: var(--ink);
      border-color: var(--ink);
      color: #fff;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 170px;
      gap: 10px;
      margin-bottom: 14px;
    }

    .field {
      width: 100%;
      border: 1px solid var(--line);
      background: #fffdf9;
      color: var(--ink);
      border-radius: 14px;
      padding: 11px 13px;
      outline: none;
    }

    textarea.field {
      min-height: 88px;
      resize: vertical;
    }

    .recommend-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .recommend-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      min-height: 150px;
      position: relative;
      background: var(--paper);
      box-shadow: 0 12px 28px rgba(119, 76, 42, .08);
    }

    .recommend-card img {
      width: 100%;
      height: 100%;
      min-height: 150px;
      object-fit: cover;
      display: block;
    }

    .recommend-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.02), rgba(0,0,0,.58));
    }

    .recommend-info {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      color: #fff;
      z-index: 1;
    }

    .recommend-info strong { display: block; font-size: 19px; }
    .recommend-info span { font-size: 13px; color: rgba(255,255,255,.86); }

    .dish-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .dish-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 18px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      box-shadow: 0 14px 32px rgba(119, 76, 42, .1);
      transition: transform .16s ease, box-shadow .16s ease;
    }

    .dish-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 42px rgba(119, 76, 42, .16);
    }

    .dish-photo {
      position: relative;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: var(--soft);
    }

    .dish-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .badge-row {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      min-height: 24px;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255, 253, 249, .92);
      color: var(--ink);
      font-size: 12px;
      border: 1px solid rgba(240, 221, 206, .82);
    }

    .dish-body {
      padding: 12px;
      display: grid;
      gap: 9px;
      flex: 1;
    }

    .dish-title {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 8px;
    }

    .dish-title h3 {
      margin: 0;
      font-size: 19px;
      line-height: 1.25;
    }

    .stars {
      color: var(--gold);
      font-size: 13px;
      white-space: nowrap;
      margin-top: 3px;
    }

    .meta-line {
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .ingredients {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      min-height: 39px;
    }

    .dish-actions {
      display: grid;
      grid-template-columns: 1fr 38px 38px;
      gap: 8px;
      margin-top: auto;
    }

    .side {
      position: sticky;
      top: 76px;
      display: grid;
      gap: 14px;
    }

    .panel {
      background: rgba(255, 253, 249, .92);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 21px;
    }

    .member-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .member {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 8px 5px;
      color: var(--muted);
    }

    .member.active {
      background: var(--soft);
      color: var(--brand-dark);
      border-color: #ffc399;
      font-weight: 700;
    }

    .order-meta {
      display: grid;
      gap: 9px;
    }

    .cart-list {
      display: grid;
      gap: 8px;
      max-height: 340px;
      overflow: auto;
      padding-right: 2px;
    }

    .cart-item, .order-card {
      border: 1px solid var(--line);
      background: #fffdf9;
      border-radius: 16px;
      padding: 10px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .cart-item strong,
    .order-card strong { display: block; }

    .cart-item span,
    .order-card p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin: 3px 0 0;
    }

    .order-card {
      display: grid;
      gap: 9px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: max-content;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 700;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 16px;
      padding: 16px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 253, 249, .72);
    }

    .admin-only { display: none !important; }
    .admin-mode .actions .admin-only { display: inline-flex !important; }
    .admin-mode .dish-actions .admin-only { display: inline-flex !important; }
    .admin-mode .admin-block,
    .admin-mode section.admin-only,
    .admin-mode .panel.admin-only {
      display: block !important;
    }
    .admin-mode .customer-only { display: none !important; }

    .admin-nav {
      display: none;
      gap: 8px;
      overflow-x: auto;
      padding: 6px 0 14px;
      margin-top: 4px;
    }

    .admin-mode .admin-nav {
      display: flex !important;
    }

    .admin-mode .actions #addDishBtn.admin-only,
    .admin-mode .actions #syncImagesBtn.admin-only {
      display: none !important;
    }

    .admin-nav button {
      flex: 0 0 auto;
    }

    .admin-module-hidden {
      display: none !important;
    }

    .admin-mode.admin-tab-orders .layout {
      grid-template-columns: minmax(0, 760px);
      justify-content: center;
    }

    .admin-mode.admin-tab-orders .layout > div {
      display: none;
    }

    .admin-mode.admin-tab-orders .side {
      position: static;
    }

    .admin-mode.admin-tab-menu .side,
    .admin-mode.admin-tab-stats .side {
      display: none;
    }

    .admin-mode.admin-tab-menu .layout,
    .admin-mode.admin-tab-stats .layout {
      grid-template-columns: 1fr;
    }

    .admin-mode.admin-tab-menu [data-admin-module]:not([data-admin-module="menu"]),
    .admin-mode.admin-tab-orders [data-admin-module]:not([data-admin-module="orders"]),
    .admin-mode.admin-tab-stats [data-admin-module]:not([data-admin-module="stats"]) {
      display: none !important;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .analytics-hero {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 10px;
    }

    .analytics-highlight {
      min-height: 150px;
      border-radius: 22px;
      padding: 18px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(255,122,69,.92), rgba(217,119,6,.82)),
        radial-gradient(circle at top right, rgba(255,255,255,.28), transparent 30%);
      box-shadow: 0 18px 44px rgba(255, 122, 69, .22);
    }

    .analytics-highlight strong {
      display: block;
      font-size: 38px;
      line-height: 1;
      margin: 8px 0;
    }

    .analytics-highlight span {
      color: rgba(255,255,255,.9);
    }

    .stat {
      background:
        linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,247,239,.96));
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 12px 30px rgba(119, 76, 42, .08);
    }

    .stat strong {
      display: block;
      font-size: 30px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .stat.wide {
      grid-column: 1 / -1;
    }

    .preference-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .preference-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      border-top: 1px solid var(--line);
      padding-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .rank-bar {
      grid-column: 1 / -1;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--soft);
    }

    .rank-bar i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--brand), var(--gold));
    }

    .stat-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .stat-title strong {
      font-size: 22px;
    }

    .stat-title em {
      font-style: normal;
      color: var(--brand-dark);
      background: var(--soft);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 13px;
      white-space: nowrap;
    }

    .ai-box {
      display: grid;
      gap: 10px;
    }

    .ai-result {
      display: grid;
      gap: 8px;
    }

    dialog {
      border: 0;
      border-radius: 20px;
      padding: 0;
      width: min(700px, calc(100% - 28px));
      background: var(--paper);
      color: var(--ink);
      box-shadow: 0 24px 74px rgba(46, 36, 27, .28);
    }

    dialog::backdrop { background: rgba(46, 36, 27, .44); }

    .modal-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .modal-head h2 { margin: 0; font-size: 21px; }

    .form {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .form label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .form label.wide { grid-column: 1 / -1; }

    .modal-actions {
      padding: 0 16px 16px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      background: var(--ink);
      color: white;
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      transition: opacity .2s ease, transform .2s ease;
      z-index: 40;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; min-height: auto; }
      .hero-photo { min-height: 330px; }
      .layout { grid-template-columns: 1fr; }
      .side { position: static; }
      .dish-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 660px) {
      .app { width: min(100% - 18px, 1180px); padding-top: 6px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .actions { width: 100%; overflow-x: auto; flex-wrap: nowrap; justify-content: flex-start; padding-bottom: 2px; }
      .hero { padding-top: 14px; }
      .hero-photo { min-height: 280px; border-radius: 22px; }
      .hero-actions .btn { flex: 1 1 auto; }
      .toolbar { grid-template-columns: 1fr; }
      .recommend-grid, .dish-grid, .stats-grid { grid-template-columns: 1fr; }
      .analytics-hero { grid-template-columns: 1fr; }
      .form { grid-template-columns: 1fr; }
      .member-row { grid-template-columns: repeat(2, 1fr); }
    }

    @media print {
      .topbar, .hero, .side, .toolbar, .category-strip, .dish-actions { display: none !important; }
      body { background: white; }
      .dish-grid { grid-template-columns: repeat(2, 1fr); }
      .dish-card { box-shadow: none; break-inside: avoid; }
    }
  </style>
</head>
<body class="customer-mode">
  <main class="app">
    <header class="topbar">
      <div class="mini-brand">
        <span class="mini-logo">🍳</span>
        <span>Wenni私厨</span>
      </div>
      <div class="actions">
        <button class="btn secondary" id="customerViewBtn" type="button">家人点单</button>
        <button class="btn secondary" id="adminViewBtn" type="button">私厨后台</button>
        <button class="btn secondary admin-only" id="cloudBtn" type="button">云端设置</button>
        <button class="btn secondary admin-only" id="printBtn" type="button">打印</button>
        <button class="btn secondary admin-only" id="exportBtn" type="button">导出</button>
        <button class="btn secondary admin-only" id="importBtn" type="button">导入</button>
        <button class="btn secondary admin-only" id="syncImagesBtn" type="button">补齐菜品图</button>
        <button class="btn admin-only" id="addDishBtn" type="button">新增菜品</button>
      </div>
    </header>

    <nav class="admin-nav admin-only" id="adminNav" aria-label="私厨后台二级菜单">
      <button class="tab active" type="button" data-admin-tab="orders">订单看板</button>
      <button class="tab" type="button" data-admin-tab="menu">菜单</button>
      <button class="tab" type="button" data-admin-tab="add">新增菜品</button>
      <button class="tab" type="button" data-admin-tab="images">补齐菜品图片</button>
      <button class="tab" type="button" data-admin-tab="stats">数据分析</button>
    </nav>

    <section class="hero customer-only">
      <div class="hero-copy">
        <span class="eyebrow">今日现做 · 家人专享</span>
        <h1>Wenni私厨</h1>
        <p class="subtitle">早餐｜晚餐｜预约菜<br>家里人想吃什么，直接来这里点。</p>
        <div class="hero-actions">
          <a class="btn" href="#menuSection">开始点餐</a>
          <a class="btn secondary" href="#recommendSection">看今日推荐</a>
        </div>
      </div>
      <div class="hero-photo" aria-label="私厨菜品背景图">
        <div class="hero-note">
          <strong>今晚吃点热乎的</strong>
          <span>1荤 + 1素 + 1汤，私厨来安排。</span>
        </div>
      </div>
    </section>

    <section class="section customer-only" id="recommendSection">
      <div class="section-head">
        <div>
          <h2>🔥 今日推荐</h2>
          <p>优先推荐招牌、孩子爱吃、最近适合安排的菜。</p>
        </div>
      </div>
      <div class="recommend-grid" id="recommendGrid"></div>
    </section>

    <section class="section admin-module" data-admin-module="menu">
      <div class="section-head">
        <div>
          <h2 id="menuSection">菜单</h2>
          <p>像点外卖一样选菜，提交后私厨后台会收到。</p>
        </div>
      </div>
      <nav class="category-strip" id="tabs" aria-label="菜品分类"></nav>
    </section>

    <section class="layout">
      <div>
        <div class="toolbar admin-module" data-admin-module="menu">
          <input class="field" id="searchInput" placeholder="搜索菜名、食材、标签" />

      dish("羊汤", "预约菜", "2-3小时", 120, "羊肉/羊骨、葱、姜、白萝卜", ["预约", "周末", "少频繁点"], "适合周末或特别想吃时点。")

    const categories = ["全部", "招牌菜", "早餐", "午餐", "晚餐", "快手菜", "预约菜"];

      { text: "已下单", icon: "📝" },
      { text: "制作中", icon: "👩‍🍳" },

    let dishes = loadDishes();
    let cart = loadCart();
    let orders = [];
    let cloud = loadCloud();
    let activeCategory = "全部";
    let editingId = null;
    let currentView = localStorage.getItem(VIEW_KEY) || "customer";
    let selectedMember = localStorage.getItem("family_private_chef_member") || "妈妈";
    if (selectedMember === "儿子") selectedMember = "亲戚/朋友";

    const $ = id => document.getElementById(id);

    function dish(name, category, time, minutes, ingredients, tags, note) {
      return { id: uuid(), name, category, time, minutes, ingredients, tags, note, image: dishImages[name] || "" };
    }

    function uuid() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function loadDishes() {
      const saved = localStorage.getItem(STORAGE_KEY) || localStorage.getItem(OLD_STORAGE_KEY);
      if (!saved) return defaultDishes;
      try {
        return JSON.parse(saved).map(normalizeDish);
      } catch {
        return defaultDishes;
      }
    }

    function normalizeDish(item) {
      const categoryMap = { "招牌拿手菜": "招牌菜", "主食/早餐/夜宵": "早餐" };
      return {
        id: item.id || uuid(),
        name: item.name || "未命名菜品",
        category: categoryMap[item.category] || item.category || "晚餐",
        time: item.time || "待定",
        minutes: Number(item.minutes || 30),
        ingredients: item.ingredients || "",
        tags: Array.isArray(item.tags) ? item.tags : [],
        image: item.image || dishImages[item.name] || "",
        note: item.note || ""
      };
    }

    function saveDishes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(dishes));
    }

    function loadCart() {
      const saved = localStorage.getItem(ORDER_KEY);
      return saved ? JSON.parse(saved) : [];
    }

    function saveCart() {
      localStorage.setItem(ORDER_KEY, JSON.stringify(cart));
    }

    function loadCloud() {
      const fileConfig = window.PRIVATE_CHEF_CONFIG || {};
      if (fileConfig.supabaseUrl && fileConfig.supabaseAnonKey) {
        return { enabled: true, url: fileConfig.supabaseUrl, key: fileConfig.supabaseAnonKey, source: "config" };
      }
      const saved = localStorage.getItem(CLOUD_KEY);
      return saved ? JSON.parse(saved) : { enabled: false, url: "", key: "" };
    }

    function saveCloud() {
      localStorage.setItem(CLOUD_KEY, JSON.stringify(cloud));
    }

    function isCloudReady() {
      return Boolean(cloud.enabled && cloud.url && cloud.key);
    }

    async function cloudRequest(path, options = {}) {
      const url = `${cloud.url.replace(/\/$/, "")}/rest/v1/${path}`;
      const response = await fetch(url, {
        ...options,
        headers: {
          apikey: cloud.key,
          Authorization: `Bearer ${cloud.key}`,
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });
      if (!response.ok) throw new Error(await response.text());
      if (response.status === 204) return null;
      return response.json();
    }

    async function storageUpload(file) {
      if (!isCloudReady() || !file) return "";
      const ext = (file.name.split(".").pop() || "jpg").toLowerCase();
      const path = `${Date.now()}-${Math.random().toString(16).slice(2)}.${ext}`;
      const response = await fetch(`${cloud.url.replace(/\/$/, "")}/storage/v1/object/${IMAGE_BUCKET}/${path}`, {
        method: "POST",
        headers: {
          apikey: cloud.key,
          Authorization: `Bearer ${cloud.key}`,
          "Content-Type": file.type || "application/octet-stream",
          "x-upsert": "true"
        },
        body: file
      });
      if (!response.ok) throw new Error(await response.text());
      return `${cloud.url.replace(/\/$/, "")}/storage/v1/object/public/${IMAGE_BUCKET}/${path}`;
    }

    async function loadCloudDishes() {
      if (!isCloudReady()) return;
      try {
        const rows = await cloudRequest("dishes?select=*&order=created_at.desc");
        if (Array.isArray(rows) && rows.length) {
          const shouldBackfillImages = rows.some(row => !row.image && dishImages[row.name]);
          dishes = rows.map(fromCloudDish);
          saveDishes();
          renderAll();
          if (shouldBackfillImages) syncLocalDishesToCloud().catch(() => {});
        } else if (Array.isArray(rows) && !rows.length && dishes.length) {
          await syncLocalDishesToCloud();
          showToast("已把本地菜单同步到云端");
        }
      } catch {
        showToast("云端菜单读取失败");
      }
    }

    async function loadCloudOrders() {
      if (!isCloudReady()) {
        orders = [];
        renderOrders();
        renderStats();
        return;
      }
      try {
        const rows = await cloudRequest("orders?select=*&order=created_at.desc&limit=100");
        orders = Array.isArray(rows) ? rows : [];
        renderOrders();
        renderStats();
      } catch {
        showToast("订单读取失败");
      }

    function toCloudDish(item) {
      return {
        id: item.id,
        name: item.name,
        category: item.category,
        time: item.time,
        minutes: item.minutes,
        ingredients: item.ingredients,
        tags: item.tags || [],
        image: item.image || "",
        note: item.note || ""
      };
    }

    function fromCloudDish(row) {
      return normalizeDish(row);
    }

    async function upsertCloudDish(item) {
      if (!isCloudReady()) return;
      await cloudRequest("dishes", {
        method: "POST",
        headers: { Prefer: "resolution=merge-duplicates" },
        body: JSON.stringify(toCloudDish(item))
      });
    }

    async function syncLocalDishesToCloud() {
      if (!isCloudReady() || !dishes.length) return;
      await cloudRequest("dishes", {
        method: "POST",
        headers: { Prefer: "resolution=merge-duplicates" },
        body: JSON.stringify(dishes.map(toCloudDish))
      });
    }

    async function deleteCloudDish(id) {
      if (!isCloudReady()) return;
      await cloudRequest(`dishes?id=eq.${encodeURIComponent(id)}`, { method: "DELETE" });

    function defaultImage(item) {
      const palette = {
        "招牌菜": ["#ff7a45", "#ffd1a8"],
        "快手菜": ["#2f8f6b", "#bfe8d6"],
        "早餐": ["#d97706", "#ffe1a8"],
        "晚餐": ["#8b5e3c", "#ffd7b8"],
        "预约菜": ["#7c4d8f", "#e8c9f0"]
      };
      const pair = palette[item.category] || palette["晚餐"];
      const text = escapeXml(item.name.slice(0, 6));
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="${pair[0]}"/><stop offset="1" stop-color="${pair[1]}"/></linearGradient></defs><rect width="800" height="600" fill="url(#g)"/><circle cx="650" cy="130" r="120" fill="rgba(255,255,255,.2)"/><circle cx="120" cy="515" r="155" fill="rgba(255,255,255,.16)"/><rect x="145" y="170" width="510" height="250" rx="32" fill="rgba(255,253,249,.88)"/><text x="400" y="300" text-anchor="middle" dominant-baseline="middle" font-size="68" font-family="Microsoft YaHei, sans-serif" fill="#2e241b">${text}</text><text x="400" y="372" text-anchor="middle" font-size="30" font-family="Microsoft YaHei, sans-serif" fill="#7a6758">Wenni私厨</text></svg>`;

    function getFilteredDishes() {
      const query = $("searchInput").value.trim().toLowerCase();
      let list = dishes.filter(item => {
        const inCategory = activeCategory === "全部" || item.category === activeCategory;
        const text = [item.name, item.category, item.time, item.ingredients, item.note, ...(item.tags || [])].join(" ").toLowerCase();
        return inCategory && (!query || text.includes(query));
      });
      if ($("sortSelect").value === "timeAsc") list = list.sort((a, b) => a.minutes - b.minutes);
      if ($("sortSelect").value === "timeDesc") list = list.sort((a, b) => b.minutes - a.minutes);

    function renderRecommend() {
      const selected = [...dishes]
        .sort((a, b) => scoreDish(b) - scoreDish(a))
        .slice(0, 3);
      $("recommendGrid").innerHTML = selected.map(item => `

          <img src="${escapeAttr(item.image || defaultImage(item))}" alt="${escapeAttr(item.name)}" onerror="this.src='${defaultImage(item)}'">

    function scoreDish(item) {
      const tags = (item.tags || []).join(",");
      let score = 0;
      if (item.category === "招牌菜") score += 20;
      if (item.category === "快手菜") score += 10;
      if (tags.includes("孩子")) score += 14;
      if (tags.includes("减脂")) score += 9;
      if (tags.includes("预约")) score -= 5;
      score += Math.max(0, 60 - item.minutes) / 10;
      return score;
    }

        if (order.note) notes += 1;
        statusCounts.set(order.status || "已下单", (statusCounts.get(order.status || "已下单") || 0) + 1);
        const hour = new Date(order.created_at).getHours();
        if (!Number.isNaN(hour)) hourCounts.set(hour, (hourCounts.get(hour) || 0) + 1);
        (order.items || []).forEach(item => {
          dishCounts.set(item.name, (dishCounts.get(item.name) || 0) + 1);
          const memberMap = memberDishCounts.get(memberName);
          memberMap.set(item.name, (memberMap.get(item.name) || 0) + 1);

      const topDish = [...dishCounts.entries()].sort((a, b) => b[1] - a[1])[0]?.[0] || "暂无";
      const topMember = [...memberCounts.entries()].sort((a, b) => b[1] - a[1])[0]?.[0] || "暂无";

      const maxDishCount = Math.max(1, ...topDishes.map(item => item[1]));

      const maxMemberCount = Math.max(1, ...topMembers.map(item => item[1]));
      const topHour = [...hourCounts.entries()].sort((a, b) => b[1] - a[1])[0];
      const avgDishes = periodOrders.length ? Math.round(([...dishCounts.values()].reduce((sum, count) => sum + count, 0) / periodOrders.length) * 10) / 10 : 0;
      const preferences = [...memberDishCounts.entries()].map(([member, map]) => {

              <div class="preference-item"><span>高峰下单时间</span><span>${topHour ? String(topHour[0]).padStart(2, "0") + ":00" : "暂无"}</span></div>
              <div class="preference-item"><span>有备注订单</span><span>${notes} 单</span></div>
            </div>
          </div>
        </div>
        <div class="stat"><strong>${periodOrders.length}</strong><span>${periodLabel}点单</span></div>
        <div class="stat"><strong>${escapeHtml(topDish)}</strong><span>最受欢迎</span></div>
        <div class="stat"><strong>${escapeHtml(topMember)}</strong><span>最爱点单</span></div>
        <div class="stat"><strong>${dishCounts.size}</strong><span>被点过的菜</span></div>
        <div class="stat"><strong>${notes}</strong><span>有备注订单</span></div>
        <div class="stat"><strong>${dishes.length}</strong><span>菜单菜品数</span></div>
        <div class="stat wide">
          <div class="stat-title"><strong>${periodLabel}菜品排行</strong><em>Top 5</em></div>
          <div class="preference-list">

              <div class="preference-item">
                <span>${index + 1}. ${escapeHtml(name)}</span>
                <span>${count} 次</span>

          </div>

    function isToday(order) {
      const date = new Date(order.created_at);
      const now = new Date();
      return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth() && date.getDate() === now.getDate();
    }

    function formatOrderTime(value) {
      if (!value) return "时间未知";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "时间未知";
      return date.toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    function isInPeriod(value, period) {
      const date = new Date(value);
      const now = new Date();
      if (period === "year") return date.getFullYear() === now.getFullYear();
      if (period === "month") return date.getFullYear() === now.getFullYear() && date.getMonth() === now.getMonth();
      const start = new Date(now);
      const day = start.getDay() || 7;
      start.setHours(0, 0, 0, 0);
      start.setDate(start.getDate() - day + 1);
      return date >= start && date <= now;
    }

    function buildOrderText() {
      const name = $("orderName").value.trim() || selectedMember || "家人";
      const mealTime = $("mealTime").value.trim() || "待定";
      const people = $("peopleCount").value.trim() || "2人";
      const note = $("orderNote").value.trim() || "无";
      const items = cart.map((item, index) => `${index + 1}. ${item.name}｜${item.time}｜${item.ingredients}`).join("\n");
      return `【Wenni私厨点单】\n点单人：${name}\n用餐人数：${people}\n希望开饭时间：${mealTime}\n\n想点的菜：\n${items || "还没有选择菜品"}\n\n备注：${note}`;
    }

    async function submitOrder() {
      if (!cart.length) {
        showToast("请先选择菜品");
        return;
      }
      if (!isCloudReady()) {
        await copyText(buildOrderText());
        showToast("未连接云端，已复制点单到微信");
        return;
      }
      const payload = {
        customer_name: $("orderName").value.trim() || selectedMember || "家人",
        meal_time: $("mealTime").value.trim() || "待定",
        people_count: $("peopleCount").value.trim() || "2人",
        note: $("orderNote").value.trim() || "",
        items: cart,
        status: "已下单"
      };
      try {
        await cloudRequest("orders", {
          method: "POST",
          headers: { Prefer: "return=representation" },
          body: JSON.stringify(payload)
        });
        cart = [];
        saveCart();
        renderCart();
        showToast("点单已提交给私厨");
        await loadCloudOrders();
      } catch {
        await copyText(buildOrderText());
        showToast("提交失败，已复制到微信");
      }
    }

    async function saveDishFromForm() {
      const file = $("dishImageFile").files[0];
      let image = $("dishImage").value.trim();
      if (file) {
        try {
          image = await storageUpload(file);
        } catch {
          showToast("图片上传失败，菜品仍会保存");
        }
      }
      const item = {
        id: editingId || uuid(),
        name: $("dishName").value.trim(),
        category: $("dishCategory").value,
        time: $("dishTime").value.trim(),
        minutes: Number($("dishMinutes").value),
        ingredients: $("dishIngredients").value.trim(),
        tags: $("dishTags").value.split(/[，,]/).map(tag => tag.trim()).filter(Boolean),
        image,
        note: $("dishNote").value.trim()
      };
      if (editingId) dishes = dishes.map(dishItem => dishItem.id === editingId ? item : dishItem);
      else dishes.unshift(item);
      saveDishes();
      try {
        await upsertCloudDish(item);
      } catch {
        showToast("本地已保存，云端同步失败");
      }
      $("dishDialog").close();
      renderAll();
      showToast("菜品已保存");

    function generateAiRecommend() {
      const words = $("ingredientInput").value.split(/[，,\s、]+/).map(item => item.trim()).filter(Boolean);
      if (!words.length) {
        $("aiResult").innerHTML = `<div class="empty">先输入家里现有食材。</div>`;
        return;
      }
      const matches = dishes.map(item => {
        const text = `${item.name} ${item.ingredients} ${(item.tags || []).join(" ")}`;
        const hit = words.filter(word => text.includes(word)).length;
        return { item, hit };
      }).filter(row => row.hit > 0).sort((a, b) => b.hit - a.hit || a.item.minutes - b.item.minutes).slice(0, 3);
      if (!matches.length) {
        $("aiResult").innerHTML = `<div class="empty">没有直接匹配的菜，可以点快手菜或让私厨发挥。</div>`;
        return;
      }
      $("aiResult").innerHTML = matches.map(row => `
        <button class="cart-item" type="button" data-order-id="${row.item.id}">
          <div>
            <strong>${escapeHtml(row.item.name)}</strong>
            <span>匹配 ${row.hit} 个食材｜${escapeHtml(row.item.time)}</span>
          </div>
          <span>加入</span>
        </button>
      `).join("");
    }

    async function copyOrShareOrder() {
      const text = buildOrderText();
      if (navigator.share) {
        try {
          await navigator.share({ title: "Wenni私厨点单", text });
          showToast("已打开分享面板");
          return;
        } catch {}
      }
      await copyText(text);
      showToast("点单已复制，可以粘贴到微信");
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return;
      }
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.focus();
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }

    function exportMenu() {
      const blob = new Blob([JSON.stringify(dishes, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "Wenni私厨菜单.json";
      a.click();
      URL.revokeObjectURL(url);
      showToast("菜单已导出");
    }

    function showToast(message) {
      $("toast").textContent = message;
      $("toast").classList.add("show");
      setTimeout(() => $("toast").classList.remove("show"), 1800);
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }

    function escapeXml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&apos;" }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    $("tabs").addEventListener("click", event => {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      activeCategory = button.dataset.category;
      renderAll();
    });

    document.addEventListener("click", event => {
      const orderButton = event.target.closest("[data-order-id]");
      if (orderButton) {
        const item = dishes.find(dishItem => dishItem.id === orderButton.dataset.orderId);
        if (item) addToCart(item);
      }
    });

    $("dishGrid").addEventListener("click", event => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const item = dishes.find(dishItem => dishItem.id === button.dataset.id);
      if (!item) return;
      if (button.dataset.action === "order") addToCart(item);
      if (button.dataset.action === "edit") openDishDialog(item);
      if (button.dataset.action === "delete" && confirm(`确定删除「${item.name}」吗？`)) {
        dishes = dishes.filter(dishItem => dishItem.id !== item.id);
        saveDishes();
        deleteCloudDish(item.id).catch(() => showToast("云端删除失败，本地已删除"));
        renderAll();
      }
    });

    $("memberRow").addEventListener("click", event => {
      const button = event.target.closest("[data-member]");
      if (!button) return;
      selectedMember = button.dataset.member;
      localStorage.setItem("family_private_chef_member", selectedMember);
      renderMembers();
    });

    $("cartList").addEventListener("click", event => {
      const button = event.target.closest("[data-remove]");
      if (!button) return;
      cart = cart.filter(item => item.id !== button.dataset.remove);
      saveCart();
      renderCart();
    });

    $("dishForm").addEventListener("submit", async event => {
      event.preventDefault();
      await saveDishFromForm();
    });

    $("cloudForm").addEventListener("submit", async event => {
      event.preventDefault();
      cloud = { enabled: true, url: $("cloudUrl").value.trim(), key: $("cloudKey").value.trim() };
      saveCloud();
      $("cloudDialog").close();
      await loadCloudDishes();
      await loadCloudOrders();
      showToast("云端设置已保存");
    });

    $("fileInput").addEventListener("change", event => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          dishes = JSON.parse(reader.result).map(normalizeDish);
          saveDishes();
          renderAll();
          showToast("菜单已导入");
        } catch {
          showToast("导入失败，请检查文件");
        }
      };
      reader.readAsText(file);
      $("fileInput").value = "";
    });

    $("orderList").addEventListener("change", event => {
      const select = event.target.closest("[data-order-status]");
      if (!select) return;
      updateOrderStatus(select.dataset.orderStatus, select.value);
    });

    $("customerViewBtn").addEventListener("click", () => {
      currentView = "customer";
      localStorage.setItem(VIEW_KEY, currentView);
      renderAll();
    });

    $("adminViewBtn").addEventListener("click", async () => {
      currentView = "admin";
      localStorage.setItem(VIEW_KEY, currentView);
      renderAll();
      await loadCloudOrders();
    });

    $("cloudBtn").addEventListener("click", () => {
      $("cloudUrl").value = cloud.url || "";
      $("cloudKey").value = cloud.key || "";
      $("cloudDialog").showModal();
    });

    $("disableCloudBtn").addEventListener("click", () => {
      cloud = { enabled: false, url: "", key: "" };
      saveCloud();
      $("cloudDialog").close();
      renderAll();
      showToast("已关闭云端模式");
    });

    $("addDishBtn").addEventListener("click", () => openDishDialog());
    $("closeDialogBtn").addEventListener("click", () => $("dishDialog").close());
    $("cancelBtn").addEventListener("click", () => $("dishDialog").close());
    $("closeCloudBtn").addEventListener("click", () => $("cloudDialog").close());
    $("submitOrderBtn").addEventListener("click", submitOrder);
    $("shareOrderBtn").addEventListener("click", copyOrShareOrder);
    $("clearCartBtn").addEventListener("click", () => { cart = []; saveCart(); renderCart(); });
    $("refreshOrdersBtn").addEventListener("click", loadCloudOrders);
    $("printBtn").addEventListener("click", () => window.print());
    $("exportBtn").addEventListener("click", exportMenu);
    $("importBtn").addEventListener("click", () => $("fileInput").click());
    $("searchInput").addEventListener("input", renderDishes);
    $("sortSelect").addEventListener("change", renderDishes);
    $("statsPeriod").addEventListener("change", renderStats);
    $("aiRecommendBtn").addEventListener("click", generateAiRecommend);

    renderAll();
    loadCloudDishes().then(loadCloudOrders);
  </script>
  <script>
    (() => {
      const LOCAL_ORDERS_KEY_FIX = "family_private_chef_local_orders_v1";

      const getLocalOrdersFix = () => {
        try {
          return JSON.parse(localStorage.getItem(LOCAL_ORDERS_KEY_FIX) || "[]");
        } catch {
          return [];
        }
      };

      const saveLocalOrdersFix = value => {
        localStorage.setItem(LOCAL_ORDERS_KEY_FIX, JSON.stringify(value));
      };

      const mergeOrdersFix = (cloudList, localList) => {
        const seen = new Set();
        return [...(cloudList || []), ...(localList || [])].filter(order => {
          if (!order || seen.has(order.id)) return false;
          seen.add(order.id);
          return true;
        });
      };

      const makePayloadFix = () => ({
        customer_name: $("orderName").value.trim() || selectedMember || "家人",
        meal_time: $("mealTime").value.trim() || "待定",
        people_count: $("peopleCount").value.trim() || "2人",
        note: $("orderNote").value.trim() || "",
        items: [...cart],
        status: "已下单"
      });

      const addLocalOrderFix = payload => {
        const localOrders = getLocalOrdersFix();
        const order = {
          id: uuid(),
          ...payload,
          created_at: new Date().toISOString(),
          local_only: true
        };
        localOrders.unshift(order);
        saveLocalOrdersFix(localOrders);
        orders = mergeOrdersFix(orders, localOrders);
        renderOrders();
        renderTodayOrders();
        renderStats();
      };

      window.loadCloudOrders = async function patchedLoadCloudOrders() {
        const localOrders = getLocalOrdersFix();
        if (!isCloudReady()) {
          orders = localOrders;
          renderOrders();
          renderTodayOrders();
          renderStats();
          return;
        }
        try {
          const rows = await cloudRequest("orders?select=*&order=created_at.desc&limit=100");
          orders = mergeOrdersFix(Array.isArray(rows) ? rows : [], localOrders);
        } catch {
          orders = localOrders;
          showToast("云端订单读取失败，当前显示本机订单");
        }
        renderOrders();
        renderTodayOrders();
        renderStats();
      };

      const submitBtn = $("submitOrderBtn");
      if (submitBtn) {
        submitBtn.addEventListener("click", async event => {
          event.preventDefault();
          event.stopImmediatePropagation();
          if (!cart.length) {
            showToast("请先选择菜品");
            return;
          }
          const payload = makePayloadFix();
          if (isCloudReady()) {
            try {
              await cloudRequest("orders", {
                method: "POST",
                headers: { Prefer: "return=representation" },
                body: JSON.stringify(payload)
              });
              cart = [];
              saveCart();
              renderCart();
              showToast("点单已提交给私厨");
              await window.loadCloudOrders();
              return;
            } catch {}
          }
          addLocalOrderFix(payload);
          cart = [];
          saveCart();
          renderCart();
          showToast("云端未成功保存，已先显示在本机订单");
        }, true);
      }

      window.loadCloudOrders();
    })();
  </script>

        "卤牛肉": "https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&w=900&q=80",
        "番茄牛腩": "https://images.unsplash.com/photo-1604909052743-94e838986d24?auto=format&fit=crop&w=900&q=80",
        "羊汤": "https://images.unsplash.com/photo-1547592166-23ac45744acd?auto=format&fit=crop&w=900&q=80"
      };

      const matchImage = name => {
        if (imageFallbacks[name]) return imageFallbacks[name];
        const key = Object.keys(imageFallbacks).find(item => name.includes(item) || item.includes(name));
        return key ? imageFallbacks[key] : "";
      };

      const isBadAutoImage = image => /loremflickr\.com/i.test(image || "");

      async function syncDishImages() {
        let changed = 0;
        dishes = dishes.map(item => {
          const matched = matchImage(item.name);
          const image = matched && (isBadAutoImage(item.image) || matched !== item.image) ? matched : item.image;
          if (image && image !== item.image) changed += 1;
          return { ...item, image: image || item.image };
        });
        saveDishes();
        renderAll();
        if (isCloudReady()) {
          try {
            await syncLocalDishesToCloud();
            showToast(changed ? `已补齐 ${changed} 张菜品图并同步云端` : "菜品图已是最新");
          } catch {
            showToast(changed ? `已补齐 ${changed} 张菜品图，云端同步失败` : "菜品图已是最新");
          }
        } else {
          showToast(changed ? `已补齐 ${changed} 张菜品图` : "菜品图已是最新");
        }
      }

      const syncImagesBtn = document.getElementById("syncImagesBtn");
      if (syncImagesBtn) syncImagesBtn.addEventListener("click", syncDishImages);

      const refreshOrdersBtn = document.getElementById("refreshOrdersBtn");
      if (refreshOrdersBtn) {
        refreshOrdersBtn.addEventListener("click", event => {
          event.preventDefault();
          event.stopImmediatePropagation();
          window.loadCloudOrders();
        }, true);
      }

      const adminViewBtn = document.getElementById("adminViewBtn");
      if (adminViewBtn) {
        adminViewBtn.addEventListener("click", () => {
          setTimeout(() => window.loadCloudOrders(), 50);
        }, true);
      }
    })();
  </script>
  <script>
    (() => {
      let activeAdminTab = "orders";

      function setAdminTab(tab) {
        if (tab === "add") {
          document.getElementById("addDishBtn")?.click();
          return;
        }
        if (tab === "images") {
          document.getElementById("syncImagesBtn")?.click();
          return;
        }
        activeAdminTab = tab;
        document.body.classList.remove("admin-tab-orders", "admin-tab-menu", "admin-tab-stats");
        document.body.classList.add(`admin-tab-${activeAdminTab}`);
        document.querySelectorAll("[data-admin-tab]").forEach(button => {
          button.classList.toggle("active", button.dataset.adminTab === activeAdminTab);
        });
        document.querySelectorAll("[data-admin-module]").forEach(module => {
          const shouldShow = module.dataset.adminModule === activeAdminTab;
          module.classList.toggle("admin-module-hidden", !shouldShow && document.body.classList.contains("admin-mode"));
        });
        if (activeAdminTab === "orders" && window.loadCloudOrders) window.loadCloudOrders();
        if (activeAdminTab === "stats" && window.loadCloudOrders) window.loadCloudOrders();
      }

      document.getElementById("adminNav")?.addEventListener("click", event => {
        const button = event.target.closest("[data-admin-tab]");
        if (!button) return;
        setAdminTab(button.dataset.adminTab);
      });

      document.getElementById("adminViewBtn")?.addEventListener("click", () => {
        setTimeout(() => setAdminTab("orders"), 80);
      }, true);

      document.getElementById("customerViewBtn")?.addEventListener("click", () => {
        document.querySelectorAll("[data-admin-module]").forEach(module => {
          module.classList.remove("admin-module-hidden");
        });
      }, true);

      setTimeout(() => {
        if (document.body.classList.contains("admin-mode")) setAdminTab(activeAdminTab);
      }, 100);
    })();
  </script>
